name: Release GHCR image

on:
  release:
    types: [published]

concurrency:
  group: release-ghcr-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  push-and-pin-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (tagged by release only; no latest)
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          tags: ghcr.io/daaa1k/common-lint:${{ github.event.release.tag_name }}

      - name: Checkout default branch to pin digest in action.yml
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Pin action.yml image to digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAG_NAME: ${{ github.event.release.tag_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          [ -n "${DIGEST}" ]
          sed -i -E 's|^[[:space:]]*image:[[:space:]].*|  image: docker://ghcr.io/daaa1k/common-lint@'"${DIGEST}"'|' action.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add action.yml
          if git diff --staged --quiet; then
            echo "action.yml already pins ${DIGEST}; nothing to commit."
            exit 0
          fi
          git commit -m "chore: pin container image to GHCR digest (${TAG_NAME}) [skip ci]"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push
