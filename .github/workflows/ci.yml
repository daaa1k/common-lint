name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Build Docker image
        run: docker build -t common-lint:ci .

      - name: Lint GitHub Actions (actionlint, ghalint, zizmor)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          docker run --rm \
            -e GITHUB_TOKEN \
            -v "${GITHUB_WORKSPACE}:/github/workspace" \
            -w /github/workspace \
            --entrypoint bash \
            common-lint:ci \
            -ec 'set -euo pipefail; actionlint; ghalint run; zizmor .'

      - name: Verify npm-deps lockfile
        run: npm ci --omit=dev
        working-directory: npm-deps

      - name: Run commitlint and renovate-check (container action)
        uses: ./
        with:
          github-actions-lint: "false"
        env:
          GITHUB_TOKEN: ${{ github.token }}
