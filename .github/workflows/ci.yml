name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  typos:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: crate-ci/typos@cf5f1c29a8ac336af8568821ec41919923b05a83 # v1.45.1

  ci:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Build Docker image
        run: docker build -t common-lint:ci .

      - name: Lint GitHub Actions (actionlint, ghalint, zizmor)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          docker run --rm \
            -e GITHUB_TOKEN \
            -v "${GITHUB_WORKSPACE}:/github/workspace" \
            -w /github/workspace \
            --entrypoint bash \
            common-lint:ci \
            -ec 'set -euo pipefail; actionlint; ghalint run; zizmor .'

      - name: Verify npm-deps lockfile
        run: npm ci --omit=dev
        working-directory: npm-deps

      - name: Run entrypoint (commitlint, renovate-check, vuln-scan, PR comments)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          docker run --rm \
            -e GITHUB_TOKEN \
            -e GITHUB_EVENT_NAME \
            -e GITHUB_EVENT_PATH \
            -e GITHUB_WORKSPACE=/github/workspace \
            -e GITHUB_REPOSITORY \
            -e GITHUB_API_URL \
            -e GITHUB_SERVER_URL \
            -e GITHUB_RUN_ID \
            -e INPUT_GITHUB_ACTIONS_LINT=false \
            -e INPUT_COMMITLINT=true \
            -e INPUT_RENOVATE_CHECK=true \
            -e INPUT_TYPOS=false \
            -e INPUT_VULN_SCAN=true \
            -e INPUT_POST_PR_COMMENTS=true \
            -v "${GITHUB_WORKSPACE}:/github/workspace" \
            -v "${GITHUB_EVENT_PATH}:${GITHUB_EVENT_PATH}:ro" \
            -w /github/workspace \
            common-lint:ci
