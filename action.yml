name: Common lint
description: Static analysis for GitHub Actions workflows, commit messages, and Renovate config.

branding:
  icon: check-circle
  color: green

inputs:
  github-actions-lint:
    description: Run actionlint, ghalint, and zizmor.
    required: false
    default: "true"
  commitlint:
    description: Run commitlint on commits in the current event range.
    required: false
    default: "true"
  renovate-check:
    description: Run renovate-config-validator on renovate config files.
    required: false
    default: "true"

runs:
  using: docker
  image: docker://ghcr.io/daaa1k/common-lint@sha256:761b04e78fcb61e03c28dc7c26f6c4fb9fcef4e2abcf6bcf707b986c6ca115ec
