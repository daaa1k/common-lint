name: Common lint
description: Static analysis for GitHub Actions workflows, commit messages, and Renovate config.

branding:
  icon: check-circle
  color: green

inputs:
  github-actions-lint:
    description: Run actionlint, ghalint, and zizmor.
    required: false
    default: "true"
  commitlint:
    description: Run commitlint on commits in the current event range.
    required: false
    default: "true"
  renovate-check:
    description: Run renovate-config-validator on renovate config files.
    required: false
    default: "true"

runs:
  using: docker
  image: docker://ghcr.io/daaa1k/common-lint@sha256:1510495d147cbdc53e24df9e2ae5f7d42c7f8fd499163d84729f8bf2587187c5
