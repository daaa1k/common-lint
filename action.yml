name: Common lint
description: Static analysis for GitHub Actions workflows, commit messages, Renovate config, source typos, and Trivy filesystem vulnerability scanning.

branding:
  icon: check-circle
  color: green

inputs:
  github-actions-lint:
    description: Run actionlint, ghalint, and zizmor.
    required: false
    default: "true"
  commitlint:
    description: Run commitlint on commits in the current event range.
    required: false
    default: "true"
  renovate-check:
    description: Run renovate-config-validator on renovate config files.
    required: false
    default: "true"
  typos:
    description: Run typos (crate-ci/typos) spell checker on the repository.
    required: false
    default: "true"
  vuln-scan:
    description: Run Trivy filesystem vulnerability scan (CRITICAL/HIGH findings fail the job).
    required: false
    default: "true"
  post-pr-comments:
    description: On pull_request events, post a new issue comment per scan (requires pull-requests write on GITHUB_TOKEN).
    required: false
    default: "true"

runs:
  using: docker
  image: docker://ghcr.io/daaa1k/common-lint@sha256:dc7de8e5a374cbcf0705f5863297af94d81d70d6ec27cd57319fc46a09fcb351
