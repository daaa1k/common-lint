name: Common lint
description: Static analysis for GitHub Actions workflows, commit messages, Renovate config, and Trivy filesystem vulnerability scanning.

branding:
  icon: check-circle
  color: green

inputs:
  github-actions-lint:
    description: Run actionlint, ghalint, and zizmor.
    required: false
    default: "true"
  commitlint:
    description: Run commitlint on commits in the current event range.
    required: false
    default: "true"
  renovate-check:
    description: Run renovate-config-validator on renovate config files.
    required: false
    default: "true"
  vuln-scan:
    description: Run Trivy filesystem vulnerability scan (CRITICAL/HIGH findings fail the job).
    required: false
    default: "true"
  post-pr-comments:
    description: On pull_request events, post a new issue comment per scan (requires pull-requests write on GITHUB_TOKEN).
    required: false
    default: "true"

runs:
  using: docker
  image: docker://ghcr.io/daaa1k/common-lint@sha256:2aea1c4ef7b37c1665507dd489390825caa44bda831b705f8237b78b8976a289
